[theme]
base="dark"
primaryColor="#e94540"
backgroundColor="#0f0f1e"
secondaryBackgroundColor="#1a1a2e"
textColor="#ffffff"
font="sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[browser]
gatherUsageStats = false

[server]
port = 8501
headless = true
runOnSave = false
maxUploadSize = 200
enableXsrfProtection = true